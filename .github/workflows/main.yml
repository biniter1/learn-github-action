name: FastAPI CI demo
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: Lint stage
    runs-on: ["self-hosted","Linux","X64"]
    steps:
      - name: Setup environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.13.12"
      - name: Clone code
        uses: actions/checkout@v4
      - name: Install lint tool
        run: pip install flake8 black isort
      - name: Check code format
        run: black --check app/ tests/
      - name: Check import oders
        run: isort --check-only --diff app/ tests/
      - name: Run flake8
        run: flake8 app/ tests/ --max-line-length=88
  test:
    name: Test stage
    runs-on: ["self-hosted","Linux","X64"]
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
  build:
    name: Build stage
    runs-on: ["self-hosted","Linux","X64"]
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirement.txt
      - name: Verify app starts
        run: |
          pip install uvicorn
          timeout 5 uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          # curl -f = fail với exit code khác 0 nếu HTTP error
          # Đây là smoke test đơn giản: app có khởi động được không?

