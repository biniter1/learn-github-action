name: FastAPI CI demo
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: Lint stage
    runs-on: ["self-hosted","Linux","X64"]
    steps:
      - name: check python version
        run: |
          which python
          python --version
      - name: Clone code
        uses: actions/checkout@v4

      - name: Create venv
        run: python3 -m venv .venv

      - name: Install dependencies
        run: |
         .venv/bin/pip install -r requirements.txt
         .venv/bin/pip install -r requirements-dev.txt
  
      - name: Check code format
        run: .venv/bin/black --check app/ tests/

      - name: Check import oders
        run: .venv/bin/isort --check-only --diff app/ tests/

      - name: Run flake8
        run: .venv/bin/flake8 app/ tests/ --max-line-length=88
  test:
    name: Test stage
    runs-on: ["self-hosted","Linux","X64"]
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{runner.os}}-venv-${{hashFiles('**/requirements*.txt')}}
          restore-keys: |
            ${{runner.os}}-venv-

      - name: Setup Environment
        run: |
          test -d .venv || python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r requirements-dev.txt

  build:
    name: Build stage
    runs-on: ["self-hosted","Linux","X64"]
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{runner.os}}-venv-${{hashFiles('**/requirements*.txt')}}
          restore-keys: |
            ${{runner.os}}-venv-
      - name: Verify app starts
        run: |
          timeout 5 uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1

